<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Bilan de santé de votre site — La Jetée</title>
  <desc id="desc">Une composition de trois cartes de résultats pour l'outil d'audit de site La Jetée.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0b2229" flood-opacity=".22"/>
    </filter>
    <style>
      .eyebrow { font: 600 16px Inter, Arial, sans-serif; letter-spacing: 2px; fill: #3e6e7e; }
      .headline { font: 600 54px 'Fraunces', Georgia, serif; fill: #173b47; }
      .subhead { font: 400 22px Inter, Arial, sans-serif; fill: #5f5e5a; }
      .url { font: 600 19px Inter, Arial, sans-serif; letter-spacing: .7px; fill: #173b47; }
      .card-title { font: 600 21px 'Fraunces', Georgia, serif; fill: #173b47; }
      .score { font: 600 27px 'Fraunces', Georgia, serif; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #5f5e5a; }
      .row { font: 400 14px Inter, Arial, sans-serif; fill: #14252c; }
    </style>
    <g id="ok"><circle r="10" fill="#2f7d5d"/><path d="M-4 0l2.8 3.1L4.5-4" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g id="warn"><circle r="10" fill="#e0a04d"/><path d="M0-4v6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cy="4" r="1.2" fill="#fff"/></g>
    <g id="fail"><circle r="10" fill="#b3392b"/><path d="M-3.5-3.5l7 7m0-7l-7 7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/></g>
  </defs>

  <rect width="1200" height="630" fill="#fbf8f2"/>
  <circle cx="1155" cy="95" r="180" fill="#e0a04d" opacity=".12"/>
  <circle cx="78" cy="660" r="175" fill="#3e6e7e" opacity=".10"/>
  <line x1="60" y1="568" x2="1140" y2="568" stroke="#173b47" stroke-width="1" opacity=".16"/>

  <image href="lajetee-logo-lockup.svg" x="70" y="35" width="230" height="61"/>
  <text x="70" y="156" class="eyebrow">AUDIT.LAJETEE.FR</text>
  <text x="70" y="231" class="headline">le bilan de santé</text>
  <text x="70" y="300" class="headline">de votre site</text>
  <text x="70" y="352" class="subhead">17 points fondamentaux, vérifiés en direct.</text>
  <text x="70" y="534" class="url">audit.lajetee.fr</text>

  <g filter="url(#shadow)">
    <g transform="translate(620 240)">
      <rect width="250" height="265" rx="14" fill="#fff"/>
      <text x="22" y="39" class="card-title">Visibilité</text>
      <text x="202" y="40" class="score" fill="#2f7d5d">100</text><text x="246" y="40" text-anchor="end" class="small">/100</text>
      <line x1="20" y1="57" x2="230" y2="57" stroke="#173b47" stroke-opacity=".12"/>
      <use href="#ok" x="31" y="86"/><text x="50" y="91" class="row">Site indexable</text>
      <line x1="20" y1="105" x2="230" y2="105" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#ok" x="31" y="134"/><text x="50" y="139" class="row">Titre et description</text>
      <line x1="20" y1="153" x2="230" y2="153" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#fail" x="31" y="182"/><text x="50" y="187" class="row">Fiche établissement</text>
      <line x1="20" y1="201" x2="230" y2="201" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#ok" x="31" y="230"/><text x="50" y="235" class="row">Aperçu au partage</text>
    </g>

    <g transform="translate(790 165)">
      <rect width="270" height="286" rx="15" fill="#fff"/>
      <text x="24" y="43" class="card-title">Sécurité</text>
      <text x="210" y="44" class="score" fill="#e0a04d">60</text><text x="255" y="44" text-anchor="end" class="small">/100</text>
      <line x1="22" y1="62" x2="248" y2="62" stroke="#173b47" stroke-opacity=".12"/>
      <use href="#ok" x="35" y="94"/><text x="55" y="99" class="row">Cadenas valide</text>
      <line x1="22" y1="115" x2="248" y2="115" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#fail" x="35" y="147"/><text x="55" y="152" class="row">Identifiants visibles</text>
      <line x1="22" y1="168" x2="248" y2="168" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#warn" x="35" y="200"/><text x="55" y="205" class="row">Sécurité navigation</text>
      <line x1="22" y1="221" x2="248" y2="221" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#ok" x="35" y="253"/><text x="55" y="258" class="row">Fichiers oubliés</text>
    </g>

    <g transform="translate(950 230)">
      <rect width="240" height="255" rx="14" fill="#fff"/>
      <text x="21" y="38" class="card-title">Entretien</text>
      <text x="178" y="39" class="score" fill="#b3392b">25</text><text x="234" y="39" text-anchor="end" class="small">/100</text>
      <line x1="19" y1="56" x2="221" y2="56" stroke="#173b47" stroke-opacity=".12"/>
      <use href="#fail" x="30" y="85"/><text x="49" y="90" class="row">Liens et images</text>
      <line x1="19" y1="104" x2="221" y2="104" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#fail" x="30" y="133"/><text x="49" y="138" class="row">Code à jour</text>
      <line x1="19" y1="152" x2="221" y2="152" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#warn" x="30" y="181"/><text x="49" y="186" class="row">Dernière mise à jour</text>
      <line x1="19" y1="200" x2="221" y2="200" stroke="#173b47" stroke-opacity=".06"/>
      <use href="#ok" x="30" y="229"/><text x="49" y="234" class="row">Contenu mixte</text>
    </g>
  </g>
</svg>
